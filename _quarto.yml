website:
  title: "PyDeepCausalML"
  description: "A Python library for deep learning based causal machine learning"
  site-url: https://zia207.github.io/PyDeepCausalML/
  repo-url: https://github.com/zia207/PyDeepCausalML
  repo-branch: main
  page-navigation: true
  back-to-top-navigation: true
  search:
    location: sidebar
    type: textbox
  page-footer:
    right: "This page is built with [Quarto](https://quarto.org/)."
    left: "&copy; CC-By Zia Ahmed, Upatta Analytics, 2026"
  navbar:
    background: primary
    left:
      - text: Home
        href: index.qmd
      - text: Tutorial
        href: Tutorial/02_08_05_05_00_DeepCausalML_introduction.ipynb
      - text: Glossary
        href: Tutorial/00-scientific-terminology-glossary.qmd
      - icon: house
        href: https://sites.google.com/view/r-data-sci-env/home
        aria-label: Upatta Analytics
    right:
      - icon: box
        href: https://pypi.org/project/pydeepcausalml/
        aria-label: PyPI
      - icon: github
        href: https://github.com/zia207/PyDeepCausalML/
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/zia-ahmed207
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:zia207@gmail.com
        aria-label: Email

