tbl-cap-location: top
title-block-banner: true

execute:
  enabled: false
  echo: true
  warning: false
  message: false
  freeze: auto

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    highlight-style: github
    fontsize: 1.1em
    linestretch: 1.6
    code-fold: show
    code-tools: false
    code-copy: true
    code-link: true
    smooth-scroll: true
    toc: true
    toc-depth: 4
    toc-title: "On This Page"
    number-sections: false
    fig-align: center
    df-print: paged
    grid:
      sidebar-width: 350px
      body-width: 1200px
      margin-width: 250px
      gutter-width: 1.5rem
